<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="app-wrapper">

        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <span class="logo">💸</span>
                <h1 class="app-title">Expense & Budget Visualizer</h1>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
                <span id="themeIcon">🌙</span>
            </button>
        </header>

        <!-- Total Balance -->
        <section class="balance-card">
            <p class="balance-label">TOTAL BALANCE</p>
            <h2 class="balance-amount" id="totalBalance"><Rp></Rp>0.00</h2>
            <div class="balance-stats">
                <div class="stat income">
                    <span class="stat-icon">↑</span>
                    <div>
                        <p class="stat-label">Income</p>
                        <p class="stat-value" id="totalIncome"><Rp></Rp>0.00</p>
                    </div>
                </div>
                <div class="divider-v"></div>
                <div class="stat expense">
                    <span class="stat-icon">↓</span>
                    <div>
                        <p class="stat-label">Expense</p>
                        <p class="stat-value" id="totalExpense"><Rp></Rp>0.00</p>
                    </div>
                </div>
            </div>
        </section>

        <div class="main-grid">

            <!-- Left Column -->
            <div class="left-col">

                <!-- Add Transaction Form -->
                <section class="card">
                    <h3 class="card-title">➕ Add Transaction</h3>
                    <form id="transactionForm">
                        <div class="form-group">
                            <label for="itemName">Item Name</label>
                            <input type="text" id="itemName" placeholder="e.g. Coffee, Salary..." required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="amount">Amount (Rp)</label>
                                <input type="number" id="amount" placeholder="0.000" step="0.001" required>
                            </div>
                            <div class="form-group">
                                <label for="type">Type</label>
                                <select id="type">
                                    <option value="expense">Expense</option>
                                    <option value="income">Income</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category">
                                <option value="Food">🍔 Food</option>
                                <option value="Transport">🚗 Transport</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Entertainment">🎮 Entertainment</option>
                                <option value="Health">💊 Health</option>
                                <option value="Education">📚 Education</option>
                                <option value="Salary">💼 Salary</option>
                                <option value="Other">📦 Other</option>
                            </select>
                        </div>

                        <!-- Spending Limit (Optional Challenge) -->
                        <div class="form-group">
                            <label for="spendingLimit">Monthly Spending Limit (Rp) <span class="optional">optional</span></label>
                            <input type="number" id="spendingLimit" placeholder="Set your limit..." step="0.01">
                        </div>

                        <button type="submit" class="btn-primary">Add Transaction</button>
                    </form>
                </section>

                <!-- Sort Controls (Optional Challenge) -->
                <section class="card">
                    <div class="sort-header">
                        <h3 class="card-title">📋 Transactions</h3>
                        <div class="sort-controls">
                            <label for="sortBy">Sort:</label>
                            <select id="sortBy">
                                <option value="date">Date</option>
                                <option value="amount">Amount</option>
                                <option value="category">Category</option>
                            </select>
                        </div>
                    </div>

                    <!-- Spending Limit Warning -->
                    <div class="limit-warning hidden" id="limitWarning">
                        ⚠️ You've exceeded your monthly spending limit!
                    </div>

                    <!-- Transaction List -->
                    <div class="transaction-list" id="transactionList">
                        <div class="empty-state" id="emptyState">
                            <span>🧾</span>
                            <p>No transactions yet.<br>Add one above!</p>
                        </div>
                    </div>
                </section>

            </div>

            <!-- Right Column -->
            <div class="right-col">

                <!-- Pie Chart -->
                <section class="card">
                    <h3 class="card-title">📊 Spending by Category</h3>
                    <div class="chart-container">
                        <canvas id="spendingChart"></canvas>
                        <div class="chart-empty hidden" id="chartEmpty">
                            <span>📉</span>
                            <p>No expense data yet</p>
                        </div>
                    </div>
                    <div class="chart-legend" id="chartLegend"></div>
                </section>

                <!-- Monthly Summary (Optional Challenge) -->
                <section class="card">
                    <h3 class="card-title">📅 Monthly Summary</h3>
                    <div id="monthlySummary" class="monthly-summary">
                        <p class="empty-text">No data available</p>
                    </div>
                </section>
            </div>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
